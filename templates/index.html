<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>House Price Prediction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);

padding:40px;

}

.container{

width:100%;
max-width:850px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(18px);

border-radius:25px;

padding:40px;

box-shadow:0 20px 50px rgba(0,0,0,.35);

border:1px solid rgba(255,255,255,.2);

animation:fadeIn .8s;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.header{

text-align:center;
margin-bottom:30px;

}

.header h1{

font-size:36px;
color:white;
font-weight:700;

}

.header p{

margin-top:10px;
color:#ddd;
font-size:15px;

}

.form-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}

.input-group{

display:flex;
flex-direction:column;

}

label{

color:white;
margin-bottom:8px;
font-size:14px;
font-weight:500;

}

input,
select{

padding:14px;

border:none;

border-radius:12px;

font-size:15px;

outline:none;

background:white;

transition:.3s;

}

input:focus,
select:focus{

transform:scale(1.03);

box-shadow:0 0 15px #00d4ff;

}

button{

width:100%;

margin-top:35px;

padding:16px;

border:none;

border-radius:15px;

font-size:18px;

font-weight:600;

cursor:pointer;

background:linear-gradient(90deg,#00c6ff,#0072ff);

color:white;

transition:.4s;

}

button:hover{

transform:translateY(-3px);

box-shadow:0 15px 30px rgba(0,114,255,.4);

}

.result{

margin-top:30px;

padding:20px;

border-radius:15px;

background:rgba(255,255,255,.15);

text-align:center;

}

.result h2{

color:#ffffff;

font-size:20px;

}

.result p{

margin-top:12px;

font-size:30px;

font-weight:700;

color:#00ff99;

}

.footer{

margin-top:25px;

text-align:center;

color:#ddd;

font-size:13px;

}

@media(max-width:600px){

.container{

padding:25px;

}

.header h1{

font-size:28px;

}

button{

font-size:16px;

}

.result p{

font-size:24px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>🏡 House Price Prediction</h1>

<p>Predict California House Prices using Machine Learning</p>

</div>

<form action="/predict" method="POST">

<div class="form-grid">

<div class="input-group">
<label>Longitude</label>
<input type="number" step="any" name="longitude" placeholder="-122.23" required>
</div>

<div class="input-group">
<label>Latitude</label>
<input type="number" step="any" name="latitude" placeholder="37.88" required>
</div>

<div class="input-group">
<label>Housing Median Age</label>
<input type="number" step="any" name="housing_median_age" placeholder="41" required>
</div>

<div class="input-group">
<label>Total Rooms</label>
<input type="number" step="any" name="total_rooms" placeholder="880" required>
</div>

<div class="input-group">
<label>Total Bedrooms</label>
<input type="number" step="any" name="total_bedrooms" placeholder="129" required>
</div>

<div class="input-group">
<label>Population</label>
<input type="number" step="any" name="population" placeholder="322" required>
</div>

<div class="input-group">
<label>Households</label>
<input type="number" step="any" name="households" placeholder="126" required>
</div>

<div class="input-group">
<label>Median Income</label>
<input type="number" step="any" name="median_income" placeholder="8.3252" required>
</div>

<div class="input-group">
<label>Ocean Proximity</label>

<select name="ocean_proximity">

<option value="<1H OCEAN">&lt;1H OCEAN</option>

<option value="INLAND">INLAND</option>

<option value="ISLAND">ISLAND</option>

<option value="NEAR BAY">NEAR BAY</option>

<option value="NEAR OCEAN">NEAR OCEAN</option>

</select>

</div>

</div>

<button type="submit">
🔍 Predict House Price
</button>

</form>

{% if prediction_text %}

<div class="result">

<h2>Prediction Result</h2>

<p>{{ prediction_text }}</p>

</div>

{% endif %}

<div class="footer">

Designed by <b>Omkar Satpute</b> • Machine Learning Project • Flask + Scikit-Learn

</div>

</div>

</body>

</html>
